name: Build Bootloader

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev gawk git gettext uuid-dev zlib1g-dev \
          libssl-dev bison flex rsync texinfo bc u-boot-tools device-tree-compiler wget \
          gcc-aarch64-linux-gnu

      - name: Compile U-Boot
        run: |
          # 检查系统自带的 arm64 交叉编译器是否工作正常
          aarch64-linux-gnu-gcc -v
          
          # 清理缓存并开始编译公版 spi-nand 固件
          make SOC=mt7981 BOARD=spim-nand CROSS_COMPILE=aarch64-linux-gnu-
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mt7981-uboot-bin
          path: output/*.bin
